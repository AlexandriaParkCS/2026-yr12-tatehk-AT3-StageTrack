{% extends "base.html" %}
{% block title %}Add User{% endblock %}
{% block content %}
<section class="page-header">
    <div>
        <p class="eyebrow">Super admin</p>
        <h1>Add User</h1>
        <p>Create a new StageTrack account and assign the starting role.</p>
    </div>
</section>

<section class="panel">
    <form method="post" class="form-grid two-column">
        <label>
            Full name
            <input type="text" name="name" required>
        </label>
        <label>
            Email
            <input type="email" name="email" required>
        </label>
        <label>
            Temporary password
            <input type="password" name="password" required>
        </label>
        <label>
            Role
            <select name="role" required>
                {% for role in roles %}
                    <option value="{{ role }}">{{ role }}</option>
                {% endfor %}
            </select>
        </label>
        <div class="actions">
            <button class="button button-primary" type="submit">Create user</button>
            <a class="button button-secondary" href="{{ url_for('admin.users') }}">Cancel</a>
        </div>
    </form>
</section>
{% endblock %}
