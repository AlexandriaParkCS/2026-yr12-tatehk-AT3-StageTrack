{% extends "base.html" %}
{% block title %}StageTrack{% endblock %}
{% block content %}
<section class="coming-soon-shell">
    <section class="coming-soon-card">
        <div class="coming-soon-glow"></div>
        <img class="coming-soon-logo" src="{{ url_for('static', filename='images/stagetrack-logo.png') }}" alt="StageTrack logo">
        <p class="hero-badge">Launching soon</p>
        <h1 class="coming-soon-title">StageTrack is coming soon.</h1>
        </div>
        <div class="hero-actions">
            <a class="button button-primary" href="{{ url_for('auth.login') }}">Staff access</a>
            {% if registration_open %}
                <a class="button button-secondary" href="{{ url_for('auth.register') }}">Initial setup</a>
            {% endif %}
        </div>
        <p class="coming-soon-note"></p>
    </section>
</section>
{% endblock %}
