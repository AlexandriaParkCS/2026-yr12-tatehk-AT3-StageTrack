services:
  - type: web
    name: stagetrack
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.5
      - key: DATABASE_URL
        fromDatabase:
          name: stagetrack-db
          property: connectionString
      - key: SECRET_KEY
        sync: false
      - key: PREFERRED_URL_SCHEME
        value: https
      - key: SESSION_COOKIE_SECURE
        value: true

databases:
  - name: stagetrack-db
    databaseName: stagetrack
    plan: free
    region: oregon
    postgresMajorVersion: "17"
